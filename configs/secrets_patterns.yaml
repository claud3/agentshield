# AgentShield - Secret Detection Patterns
# Regex patterns for detecting credentials in AI tool configuration files.
# Each pattern includes vendor attribution, severity, and a human-readable description.

# Entropy-based detection settings (for strings not matching any known pattern)
entropy_threshold: 4.5   # Shannon entropy bits - strings above this are flagged
min_entropy_length: 20   # Minimum string length to consider for entropy analysis

patterns:
  # ── Critical: Direct access to production data or infrastructure ──

  - name: databricks_token
    vendor: databricks
    type: bearer_token
    severity: critical
    regex: 'dapi[a-f0-9]{32}'
    description: "Databricks personal access token"

  - name: github_pat_classic
    vendor: github
    type: pat
    severity: critical
    regex: 'ghp_[A-Za-z0-9_]{36}'
    description: "GitHub personal access token (classic)"

  - name: github_pat_fine_grained
    vendor: github
    type: pat
    severity: critical
    regex: 'github_pat_[A-Za-z0-9_]{82}'
    description: "GitHub fine-grained personal access token"

  - name: github_oauth_token
    vendor: github
    type: oauth_token
    severity: critical
    regex: 'gho_[A-Za-z0-9_]{36}'
    description: "GitHub OAuth access token"

  - name: github_app_token
    vendor: github
    type: app_token
    severity: critical
    regex: 'ghu_[A-Za-z0-9_]{36}'
    description: "GitHub user-to-server token"

  - name: aws_access_key
    vendor: aws
    type: access_key
    severity: critical
    regex: 'AKIA[0-9A-Z]{16}'
    description: "AWS access key ID"

  - name: aws_secret_key
    vendor: aws
    type: secret_key
    severity: critical
    regex: '(?i)aws_secret_access_key["\s:=]+[A-Za-z0-9/+=]{40}'
    description: "AWS secret access key"

  - name: gcp_service_account_key
    vendor: gcp
    type: service_account_key
    severity: critical
    regex: '"type"\s*:\s*"service_account"'
    description: "GCP service account key file content"

  - name: atlassian_api_token
    vendor: atlassian
    type: api_token
    severity: critical
    regex: 'ATATT3x[A-Za-z0-9+/=\-_]{30,}'
    description: "Atlassian (Jira/Confluence) API token"

  # ── High: API access to AI model providers or communication tools ──

  - name: anthropic_api_key
    vendor: anthropic
    type: api_key
    severity: high
    regex: 'sk-ant-[A-Za-z0-9\-_]{20,}'
    description: "Anthropic API key"

  - name: openai_api_key
    vendor: openai
    type: api_key
    severity: high
    regex: 'sk-[A-Za-z0-9]{20,}'
    description: "OpenAI API key"

  - name: openai_project_key
    vendor: openai
    type: api_key
    severity: high
    regex: 'sk-proj-[A-Za-z0-9\-_]{20,}'
    description: "OpenAI project API key"

  - name: slack_bot_token
    vendor: slack
    type: bot_token
    severity: high
    regex: 'xoxb-[0-9]{10,}-[0-9]{10,}-[A-Za-z0-9]{24}'
    description: "Slack bot token"

  - name: slack_user_token
    vendor: slack
    type: user_token
    severity: high
    regex: 'xoxp-[0-9]{10,}-[0-9]{10,}-[A-Za-z0-9]{24,}'
    description: "Slack user token"

  - name: slack_webhook
    vendor: slack
    type: webhook_url
    severity: high
    regex: 'https://hooks\.slack\.com/services/T[A-Za-z0-9]{8,}/B[A-Za-z0-9]{8,}/[A-Za-z0-9]{24}'
    description: "Slack incoming webhook URL"

  - name: stripe_secret_key
    vendor: stripe
    type: secret_key
    severity: high
    regex: 'sk_live_[A-Za-z0-9]{24,}'
    description: "Stripe live secret key"

  - name: stripe_restricted_key
    vendor: stripe
    type: restricted_key
    severity: high
    regex: 'rk_live_[A-Za-z0-9]{24,}'
    description: "Stripe live restricted key"

  - name: sendgrid_api_key
    vendor: sendgrid
    type: api_key
    severity: high
    regex: 'SG\.[A-Za-z0-9\-_]{22}\.[A-Za-z0-9\-_]{43}'
    description: "SendGrid API key"

  - name: twilio_api_key
    vendor: twilio
    type: api_key
    severity: high
    regex: 'SK[a-f0-9]{32}'
    description: "Twilio API key"

  - name: datadog_api_key
    vendor: datadog
    type: api_key
    severity: high
    regex: '[a-f0-9]{32}'  # Datadog keys are 32 hex chars - needs context check
    description: "Potential Datadog API key (32 hex chars in env/header context)"

  # ── Medium: Generic credential patterns ──

  - name: generic_bearer_token
    vendor: unknown
    type: bearer_token
    severity: medium
    regex: '[Bb]earer\s+[A-Za-z0-9\-_.~+/]{20,}'
    description: "Bearer token in authorization header"

  - name: generic_basic_auth
    vendor: unknown
    type: basic_auth
    severity: medium
    regex: '[Bb]asic\s+[A-Za-z0-9+/=]{20,}'
    description: "Basic auth credentials (base64 encoded)"

  - name: private_key_header
    vendor: unknown
    type: private_key
    severity: critical
    regex: '-----BEGIN (RSA |EC |DSA |OPENSSH )?PRIVATE KEY-----'
    description: "Private key embedded in configuration"

  - name: generic_password_field
    vendor: unknown
    type: password
    severity: medium
    regex: '(?i)(password|passwd|pwd)\s*[=:]\s*["\x27][^"\x27]{8,}["\x27]'
    description: "Password in configuration field"

  # ── Transport security issues (not credentials, but security findings) ──

  - name: allow_http_flag
    vendor: unknown
    type: insecure_transport
    severity: medium
    regex: '--allow-http'
    description: "Insecure HTTP transport explicitly allowed"

  - name: allow_insecure_host
    vendor: unknown
    type: insecure_transport
    severity: medium
    regex: '--allow-insecure-host'
    description: "TLS verification bypassed for specific host"

  - name: ws_unencrypted
    vendor: unknown
    type: insecure_transport
    severity: medium
    regex: 'ws://[^l][^o]'  # ws:// but not ws://localhost
    description: "Unencrypted WebSocket connection (ws:// instead of wss://)"
