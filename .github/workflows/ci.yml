name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        go-version: ['1.22']
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}

      - name: Build
        run: |
          go build ./cmd/agentshield-scan/
          go build ./cmd/agentshield/

      - name: Test
        run: go test ./...

      - name: Vet
        run: go vet ./...

  cross-compile:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Build all targets
        run: |
          GOOS=darwin GOARCH=arm64 go build -o agentshield-scan-darwin-arm64 ./cmd/agentshield-scan/
          GOOS=darwin GOARCH=amd64 go build -o agentshield-scan-darwin-amd64 ./cmd/agentshield-scan/
          GOOS=linux GOARCH=amd64 go build -o agentshield-scan-linux-amd64 ./cmd/agentshield-scan/
          GOOS=windows GOARCH=amd64 go build -o agentshield-scan-windows-amd64.exe ./cmd/agentshield-scan/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: binaries
          path: agentshield-scan-*
