name: Update Homebrew Tap

on:
  release:
    types: [published]

jobs:
  update-formula:
    runs-on: ubuntu-latest
    steps:
      - name: Get release info
        id: release
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "VERSION=${VERSION}" >> $GITHUB_OUTPUT
          echo "TAG=${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT

      - name: Download release assets and compute checksums
        run: |
          TAG=${{ steps.release.outputs.TAG }}
          BASE="https://github.com/claud3/agentshield/releases/download/${TAG}"

          curl -sSfL "${BASE}/agentshield-scan-darwin-arm64" -o darwin-arm64
          curl -sSfL "${BASE}/agentshield-scan-darwin-amd64" -o darwin-amd64
          curl -sSfL "${BASE}/agentshield-scan-linux-arm64" -o linux-arm64
          curl -sSfL "${BASE}/agentshield-scan-linux-amd64" -o linux-amd64

          echo "SHA_DARWIN_ARM64=$(sha256sum darwin-arm64 | awk '{print $1}')" >> $GITHUB_ENV
          echo "SHA_DARWIN_AMD64=$(sha256sum darwin-amd64 | awk '{print $1}')" >> $GITHUB_ENV
          echo "SHA_LINUX_ARM64=$(sha256sum linux-arm64 | awk '{print $1}')" >> $GITHUB_ENV
          echo "SHA_LINUX_AMD64=$(sha256sum linux-amd64 | awk '{print $1}')" >> $GITHUB_ENV

      - name: Checkout homebrew-tap
        uses: actions/checkout@v4
        with:
          repository: claud3/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: homebrew-tap

      - name: Update formula
        run: |
          VERSION=${{ steps.release.outputs.VERSION }}
          FORMULA="homebrew-tap/Formula/agentshield-scan.rb"

          # Update version
          sed -i "s/version \".*\"/version \"${VERSION}\"/" "$FORMULA"

          # Replace SHA256 hashes positionally (darwin-arm64, darwin-amd64, linux-arm64, linux-amd64)
          # Use awk to replace the Nth sha256 occurrence
          awk -v sha1="${SHA_DARWIN_ARM64}" \
              -v sha2="${SHA_DARWIN_AMD64}" \
              -v sha3="${SHA_LINUX_ARM64}" \
              -v sha4="${SHA_LINUX_AMD64}" '
          BEGIN { n=0 }
          /sha256 "/ {
            n++
            if (n==1) { sub(/"[a-f0-9]{64}"/, "\"" sha1 "\"") }
            if (n==2) { sub(/"[a-f0-9]{64}"/, "\"" sha2 "\"") }
            if (n==3) { sub(/"[a-f0-9]{64}"/, "\"" sha3 "\"") }
            if (n==4) { sub(/"[a-f0-9]{64}"/, "\"" sha4 "\"") }
          }
          { print }' "$FORMULA" > "$FORMULA.tmp" && mv "$FORMULA.tmp" "$FORMULA"

          cd homebrew-tap
          git diff

      - name: Push formula update
        run: |
          cd homebrew-tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/agentshield-scan.rb
          git commit -m "Update agentshield-scan to ${{ steps.release.outputs.VERSION }}"
          git push
